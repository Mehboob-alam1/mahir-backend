# H2 in-memory DB for local run without MySQL.
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2
# Or set SPRING_PROFILES_ACTIVE=h2
spring.datasource.url=jdbc:h2:mem:demoapp;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# H2 console (optional): http://localhost:8080/h2-console  JDBC URL: jdbc:h2:mem:demoapp
spring.h2.console.enabled=true
